version: "3.9"

services:

  redis:
    image: redis:7

    ports:
      - "6379:6379"

  backend:

    build:
      context: ./backend

    ports:
      - "5000:5000"

    depends_on:
      - redis

    env_file:
      - ./backend/.env

  worker:

    build:
      context: ./backend

    command: npm run worker

    depends_on:
      - backend
      - redis

    env_file:
      - ./backend/.env

  frontend:

    build:
      context: ./frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend